<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICFES Part 3 - Exam Mode Fixed</title>
    <style>
        :root {
            --comic-border: #000;
            --bg-color: #ffeb3b;
            --main-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--main-font);
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; justify-content: center; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed; left: -260px; top: 0; width: 250px; height: 100%;
            background: #fff; border-right: 4px solid var(--comic-border);
            z-index: 1000; transition: 0.3s ease; padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar h2 { font-weight: 900; border-bottom: 3px solid #000; margin-top: 0; padding-bottom: 10px; }
        #menu-list { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .nav-item { display: block; padding: 12px; margin: 8px 0; background: #f0f0f0; border: 3px solid var(--comic-border); text-decoration: none; color: #000; font-weight: 900; border-radius: 8px; text-align: center; }

        /* --- HEADER --- */
        .header {
            display: flex; flex-direction: column; background: #fff; border-bottom: 4px solid var(--comic-border);
            position: sticky; top: 0; z-index: 100; padding: 10px 15px;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .stats-bar { display: flex; gap: 15px; margin-top: 5px; font-weight: 900; font-size: 0.9rem; }
        .stat-win { color: #2e7d32; }
        .stat-loss { color: #c62828; }

        /* --- ESCENA --- */
        .phone-screen { max-width: 380px; width: 100%; display: flex; flex-direction: column; gap: 15px; padding: 15px; box-sizing: border-box; }
        .scene { display: flex; align-items: flex-start; gap: 10px; margin-top: 5px; min-height: 160px; }
        .character-art { position: relative; width: 100px; height: 140px; flex-shrink: 0; }
        .face { position: absolute; top: 35px; left: 15px; width: 65px; height: 80px; background: #ffdbac; border: 4px solid var(--comic-border); border-radius: 30px 30px 45px 45%; z-index: 5; }
        .hair { position: absolute; border: 4px solid var(--comic-border); z-index: 2; }
        .hair.man { height: 50px; width: 75px; top: 5px; left: 10px; border-radius: 40% 40% 10% 10%; }
        .hair.woman { height: 100px; width: 85px; top: 10px; left: 5px; border-radius: 35px 35px 15px 15px; z-index: 1; }
        .eye { position: absolute; top: 22px; width: 12px; height: 15px; background: #fff; border: 3px solid var(--comic-border); border-radius: 50%; }
        .eye.left { left: 10px; } .eye.right { right: 10px; }
        .pupil { position: absolute; top: 4px; left: 3px; width: 6px; height: 7px; background: #000; border-radius: 50%; }
        .speech-bubble { position: relative; background: #fff; border: 4px solid var(--comic-border); border-radius: 18px; padding: 15px; box-shadow: 6px 6px 0 rgba(0,0,0,0.1); flex-grow: 1; }
        .speech-bubble p { margin: 0; font-size: 1.1rem; font-weight: 800; line-height: 1.2; color: #000; }
        .speech-bubble:after { content: ''; position: absolute; left: -15px; top: 25px; border: 10px solid transparent; border-right-color: #fff; z-index: 11; }

        /* --- BOTONES --- */
        .options-area { display: flex; flex-direction: column; gap: 12px; }
        .comic-btn { background: #fff; border: 4px solid var(--comic-border); border-radius: 12px; padding: 18px; font-weight: 900; font-size: 1rem; color: #000; box-shadow: 4px 4px 0 var(--comic-border); transition: 0.1s; text-align: left; -webkit-tap-highlight-color: transparent; }
        
        .correct { background-color: #4caf50 !important; color: white !important; }
        .wrong { background-color: #f44336 !important; color: white !important; }
        .reveal { background-color: #2196f3 !important; color: white !important; border-color: #0d47a1 !important; }
        .disabled { pointer-events: none; opacity: 0.8; }

        #feedback-msg { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); padding: 15px 25px; border-radius: 50px; border: 4px solid #000; font-weight: 900; font-size: 1.1rem; z-index: 2000; box-shadow: 0 8px 20px rgba(0,0,0,0.3); display: none; align-items: center; justify-content: center; gap: 12px; min-width: 220px; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h2>PREGUNTAS</h2>
        <div id="menu-list"></div>
    </div>
    <div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; z-index:999;" onclick="toggleMenu()"></div>

    <div id="feedback-msg"></div>

    <div style="width: 100%; max-width: 400px; background: var(--bg-color);">
        <div class="header">
            <div class="header-top">
                <button style="font-size: 24px; background:none; border:none; font-weight:900;" onclick="toggleMenu()">☰</button>
                <div style="font-weight: 900;" id="counter-text">1/60</div>
            </div>
            <div class="stats-bar">
                <span class="stat-win">✅: <span id="wins">0</span></span>
                <span class="stat-loss">❌: <span id="losses">0</span></span>
            </div>
        </div>

        <div class="phone-screen">
            <div class="scene">
                <div class="character-art" id="avatar-container">
                    <div id="hair-style" class="hair"></div>
                    <div class="face">
                        <div class="eye left"><div class="pupil"></div></div>
                        <div class="eye right"><div class="pupil"></div></div>
                        <div class="mouth" style="position: absolute; bottom: 12px; left: 18px; width: 25px; height: 8px; border-bottom: 4px solid #000; border-radius: 0 0 15px 15px;"></div>
                    </div>
                    <div class="shoulders" id="shirt-style" style="position: absolute; top: 115px; left: 5px; width: 85px; height: 40px; border: 4px solid #000; border-radius: 15px 15px 0 0; z-index: 4;"></div>
                </div>
                <div class="speech-bubble">
                    <p id="question-text">Loading...</p>
                </div>
            </div>
            <div class="options-area" id="options-container"></div>
        </div>
    </div>

    <script>
        const originalDatabase = [
            { q: "Let's go to the zoo tomorrow!", options: ["It is closed.", "How many?", "Nice monkey!"], correct: 0, gender: "man", hair: "#4a3121", shirt: "#3f51b5" },
            { q: "May I have my bill?", options: ["Not cool.", "A hot drink?", "Sure!"], correct: 2, gender: "woman", hair: "#C65102", shirt: "#E91E63" },
            { q: "Why is she working at the city center?", options: ["Fine!", "Come on!", "No idea!"], correct: 2, gender: "man", hair: "#2C3E50", shirt: "#FF9800" },
            { q: "Can you hold the camera?", options: ["That's quick!", "Of course.", "May I keep this?"], correct: 1, gender: "woman", hair: "#F1C40F", shirt: "#9C27B0" },
            { q: "Honey, I invited my parents to the party.", options: ["Be careful!", "That's great!", "As soon as possible!"], correct: 1, gender: "man", hair: "#4A3121", shirt: "#2196F3" },
            { q: "Was it a wonderful journey?", options: ["You're lucky!", "Very kind of you!", "Just amazing!"], correct: 2, gender: "woman", hair: "#5D4037", shirt: "#009688" },
            { q: "Hey Mark! You should visit us next November.", options: ["How often?", "I'd love to!", "Let's look for it."], correct: 1, gender: "man", hair: "#1A1A1A", shirt: "#673AB7" },
            { q: "Anna missed the train.", options: ["That's terrible!", "Never again.", "How long is it?"], correct: 0, gender: "woman", hair: "#8D6E63", shirt: "#CDDC39" },
            { q: "Have you got a dress I can wear?", options: ["That's fine!", "Sure!", "Enjoy!"], correct: 1, gender: "man", hair: "#4E342E", shirt: "#3F51B5" },
            { q: "We couldn't swim in the pool yesterday.", options: ["Be careful!", "That's exciting!", "What happened?"], correct: 2, gender: "woman", hair: "#F48FB1", shirt: "#8E24AA" },
            { q: "Where did they buy their new car?", options: ["I don't know.", "You are right.", "It's bigger."], correct: 0, gender: "man", hair: "#546E7A", shirt: "#00BCD4" },
            { q: "I'm going to the art exhibition soon.", options: ["By the way.", "How long ago?", "How interesting!"], correct: 2, gender: "woman", hair: "#FFB300", shirt: "#FF5722" },
            { q: "We haven't discussed our tour plans yet.", options: ["You poor thing.", "Let's do it now.", "As late as possible."], correct: 1, gender: "man", hair: "#263238", shirt: "#4CAF50" },
            { q: "Have you got any spare change?", options: ["Let me check", "I've already changed it", "I lost my spare"], correct: 0, gender: "woman", hair: "#795548", shirt: "#009688" },
            { q: "Until what time does the tube work?", options: ["It goes until summer time", "The last train has already passed", "There's not enough time to work"], correct: 1, gender: "man", hair: "#455A64", shirt: "#607D8B" },
            { q: "Did he give you the 10 quid I left you?", options: ["He left you there yesterday", "He doesn't like to give anything", "What's that money for?"], correct: 2, gender: "woman", hair: "#A1887F", shirt: "#FF4081" },
            { q: "It's been a lovely supper, ________?", options: ["hasn't it", "it is", "it has"], correct: 0, gender: "man", hair: "#212121", shirt: "#8BC34A" },
            { q: "Excuse me! Can you tell me where the loo is?", options: ["It's near the chemist", "It's behind the counter", "It's right there"], correct: 2, gender: "woman", hair: "#FFD54F", shirt: "#673AB7" },
            { q: "Who's Patricia?", options: ["She's fine.", "She's my friend.", "She's Spanish."], correct: 1, gender: "woman", hair: "#C2185B", shirt: "#FBC02D" },
            { q: "Could you telephone me this evening?", options: ["I will if I can.", "I'll tell him for you.", "If I'm not there, speak to John."], correct: 0, gender: "man", hair: "#0D47A1", shirt: "#FFCA28" },
            { q: "Have you turned off the computer?", options: ["I don't want it.", "It's on the left.", "I'm still using it."], correct: 2, gender: "woman", hair: "#4CAF50", shirt: "#E91E63" },
            { q: "When do you finish your class?", options: ["Yesterday.", "At six thirty.", "Two hours ago."], correct: 1, gender: "man", hair: "#795548", shirt: "#3F51B5" },
            { q: "I think Jane's a very good teacher.", options: ["Who is it?", "How far?", "Do you?"], correct: 2, gender: "woman", hair: "#311B92", shirt: "#00C853" },
            { q: "The temperature is below zero here.", options: ["Let's go inside.", "Take off your coat.", "It's downstairs."], correct: 0, gender: "woman", hair: "#1de9b6", shirt: "#00b0ff" },
            { q: "I couldn't finish my homework, Lily!", options: ["Very often!", "That's terrible!", "Wait for it!"], correct: 1, gender: "man", hair: "#6d4c41", shirt: "#ff5722" },
            { q: "I don't like meatballs.", options: ["Have some chicken.", "It's in the kitchen.", "That's a lot."], correct: 0, gender: "woman", hair: "#D84315", shirt: "#2E7D32" },
            { q: "Would you like an apple?", options: ["You're right.", "Yes, please.", "So do I."], correct: 1, gender: "man", hair: "#1A237E", shirt: "#AD1457" },
            { q: "I think Charlie's is the best café in town!", options: ["How much is it?", "Was it wrong?", "Is it near?"], correct: 2, gender: "woman", hair: "#FFEB3B", shirt: "#6A1B9A" },
            { q: "I met my new neighbor yesterday. She's a Brazilian singer.", options: ["Welcome!", "Awesome!", "Surprise!"], correct: 1, gender: "man", hair: "#00695C", shirt: "#EF6C00" },
            { q: "Are you going to the gym tonight?", options: ["Maybe tomorrow.", "Not much.", "Twice a month."], correct: 0, gender: "woman", hair: "#4E342E", shirt: "#1565C0" },
            { q: "How long will the journey take?", options: ["Over two hours.", "At midnight.", "I won't be late."], correct: 0, gender: "man", hair: "#004D40", shirt: "#8BC34A" },
            { q: "May I borrow your bracelet, please?", options: ["A little bit.", "In cash.", "Sure."], correct: 2, gender: "woman", hair: "#880E4F", shirt: "#FFEB3B" },
            { q: "Oh, dear! I forgot how to use this cell phone.", options: ["It's repaired.", "Let me help you.", "Be prepared."], correct: 1, gender: "man", hair: "#E65100", shirt: "#03A9F4" },
            { q: "I can clean the house for you today.", options: ["That's nice!", "They're mine.", "How many?"], correct: 0, gender: "woman", hair: "#BA68C8", shirt: "#009688" },
            { q: "Shall we cook something? I'm hungry.", options: ["How often?", "I brought one!", "What about chicken?"], correct: 2, gender: "man", hair: "#795548", shirt: "#FFC107" },
            { q: "Let's go to the park and play tennis!", options: ["Answer!", "Again?", "Bye."], correct: 1, gender: "woman", hair: "#4527A0", shirt: "#00E676" },
            { q: "I'm afraid I have to buy a better laptop.", options: ["Not often.", "That's brilliant!", "What's wrong?"], correct: 2, gender: "man", hair: "#37474F", shirt: "#FF3D00" },
            { q: "Have you joined the theater club yet?", options: ["A month ago.", "Yes, I agree.", "At the moment."], correct: 0, gender: "woman", hair: "#00838F", shirt: "#E91E63" },
            { q: "Make sure that you keep the medicine in the cabinet.", options: ["It's kind.", "See you soon.", "Of course!"], correct: 2, gender: "man", hair: "#2E7D32", shirt: "#FF9100" },
            { q: "So, who is going to repair the engine?", options: ["I'll do it myself.", "I'll go straight.", "I'll look for it."], correct: 0, gender: "woman", hair: "#6D4C41", shirt: "#2979FF" },
            { q: "I can go to the restaurant and get some food.", options: ["Whose rice?", "That's really nice!", "Look at me."], correct: 1, gender: "man", hair: "#4E342E", shirt: "#8BC34A" },
            { q: "I must go home.", options: ["Who is wrong?", "That's sad!", "It's brilliant."], correct: 1, gender: "woman", hair: "#7B1FA2", shirt: "#FFEB3B" },
            { q: "I'll give you your earrings back tomorrow.", options: ["It's a special set.", "Sure, no problem.", "Wonderful jewelry."], correct: 1, gender: "man", hair: "#263238", shirt: "#FFEB3B" },
            { q: "Good to have you back in the school again!", options: ["Yes, that's funny.", "Oh! How silly.", "Thanks, I'm happy."], correct: 2, gender: "woman", hair: "#E91E63", shirt: "#00BCD4" },
            { q: "Son, stop it! You could hurt someone!", options: ["Help me, mom!", "That's sweet!", "All right!"], correct: 2, gender: "man", hair: "#4A3121", shirt: "#FF5722" },
            { q: "Do you want to make an appointment with the designer?", options: ["Just before?", "Of course!", "Last February."], correct: 1, gender: "woman", hair: "#F1C40F", shirt: "#4A148C" },
            { q: "How did you get that dictionary?", options: ["I borrowed it.", "Do you have a dollar?", "A minute ago."], correct: 0, gender: "man", hair: "#37474F", shirt: "#4CAF50" },
            { q: "We got free tickets. These two are for you.", options: ["Thank you.", "I'm worried.", "That's the best one."], correct: 0, gender: "woman", hair: "#6D4C41", shirt: "#00ACC1" },
            { q: "What time do you usually start work on weekends?", options: ["At noon.", "Only once.", "It's tomorrow."], correct: 0, gender: "man", hair: "#455A64", shirt: "#F4511E" },
            { q: "Look at that modern laptop. It's not expensive!", options: ["Anything else?", "It's the winner!", "It's on sale."], correct: 2, gender: "woman", hair: "#C2185B", shirt: "#CDDC39" },
            { q: "Hey, are you studying Spanish now?", options: ["I'm fine.", "That's right.", "It's ok."], correct: 1, gender: "man", hair: "#1A237E", shirt: "#D81B60" },
            { q: "Hello. Can you please help me? I've lost my suitcase!", options: ["It's too early.", "Hey! Be careful.", "Can you describe it?"], correct: 2, gender: "woman", hair: "#795548", shirt: "#2E7D32" },
            { q: "Are you here for the music class?", options: ["See you!", "I'm not from here.", "Yes, I'm new."], correct: 2, gender: "woman", hair: "#FBC02D", shirt: "#009688" },
            { q: "Let's go for a ride, it's a sunny day!", options: ["Are we around?", "Nothing more.", "It's the best idea!"], correct: 2, gender: "man", hair: "#795548", shirt: "#4CAF50" },
            { q: "Why didn't you put your new coat on yesterday?", options: ["I liked jeans.", "Let's dress up.", "It was too warm."], correct: 2, gender: "woman", hair: "#4E342E", shirt: "#E91E63" },
            { q: "This movie is about a really big family.", options: ["Is it good?", "Is that a lot?", "Is your mom OK?"], correct: 0, gender: "man", hair: "#37474F", shirt: "#2196F3" },
            { q: "Why are they hiding?", options: ["Come on!", "I've got no idea.", "Is it near?"], correct: 1, gender: "woman", hair: "#5D4037", shirt: "#9C27B0" },
            { q: "Everyone bought tickets for the rock concert.", options: ["Is it on Saturday?", "There was noise.", "It is fair!"], correct: 0, gender: "man", hair: "#1A1A1A", shirt: "#F44336" },
            { q: "It seems I'll be the new boss of the business department.", options: ["Excuse me!", "It's ready!", "Congratulations!"], correct: 2, gender: "woman", hair: "#F1C40F", shirt: "#3F51B5" },
            { q: "How about going to the cinema?", options: ["I'm a student.", "That sounds great!", "It's 5 o'clock."], correct: 1, gender: "man", hair: "#BF360C", shirt: "#4FC3F7" }
        ];

        let database = [];
        let currentIndex = 0;
        let scoreWins = 0;
        let scoreLosses = 0;
        let audioCtx = null;
        let isProcessing = false;

        function shuffleQuestions(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        }

        function loadQuestion() {
            isProcessing = false;
            const data = database[currentIndex];
            
            // CORRECCIÓN: Actualizar el texto de la burbuja
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('counter-text').innerText = `${currentIndex + 1}/${database.length}`;
            
            const hair = document.getElementById('hair-style');
            const shirt = document.getElementById('shirt-style');
            hair.className = "hair " + data.gender;
            hair.style.backgroundColor = data.hair;
            shirt.style.backgroundColor = data.shirt;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'comic-btn';
                btn.id = `btn-${index}`;
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => verify(btn, index);
                container.appendChild(btn);
            });
        }

        function verify(btn, selectedIndex) {
            if (isProcessing) return;
            isProcessing = true;
            initAudio();

            const correctIndex = database[currentIndex].correct;
            const buttons = document.querySelectorAll('.comic-btn');
            buttons.forEach(b => b.classList.add('disabled'));

            if(selectedIndex === correctIndex) {
                btn.classList.add('correct');
                scoreWins++;
                document.getElementById('wins').innerText = scoreWins;
                playTone(600, 'sine', 0.15);
                showFeedback("¡EXCELENTE!", "🌟", true);
                setTimeout(nextQuestion, 1200);
            } else {
                btn.classList.add('wrong');
                document.getElementById(`btn-${correctIndex}`).classList.add('reveal');
                scoreLosses++;
                document.getElementById('losses').innerText = scoreLosses;
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                playTone(150, 'square', 0.3);
                showFeedback("INCORRECTO", "❌", false);
                setTimeout(nextQuestion, 2000);
            }
        }

        function nextQuestion() {
            if(currentIndex < database.length - 1) {
                currentIndex++;
                loadQuestion();
            } else {
                showFeedback("COMPLETADO", "🏆", true);
            }
        }

        function showFeedback(text, emoji, isCorrect) {
            const msg = document.getElementById('feedback-msg');
            msg.innerHTML = `<span>${text}</span> <span>${emoji}</span>`;
            msg.style.display = 'flex';
            msg.style.backgroundColor = isCorrect ? '#4caf50' : '#f44336';
            msg.style.color = 'white';
            setTimeout(() => { msg.style.display = 'none'; }, 1500);
        }

        window.onload = () => {
            database = shuffleQuestions([...originalDatabase]);
            const list = document.getElementById('menu-list');
            database.forEach((_, i) => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.innerText = `Pregunta ${i + 1}`;
                item.onclick = () => { currentIndex = i; loadQuestion(); toggleMenu(); };
                list.appendChild(item);
            });
            loadQuestion();
        };
    </script>
</body>
</html>
