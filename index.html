<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Simulator Pro</title>
    <style>
        :root {
            --bg-color: #ffeb3b;
            --panel-bg: #ffffff;
            --text-main: #2d3436;
            --correct-color: #2ecc71;
            --wrong-color: #ff7675;
            --info-color: #0984e3;
            --shadow: 0 10px 20px rgba(0,0,0,0.1);
            --main-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--main-font);
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; justify-content: center; min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- HEADER MODERNO --- */
        .header {
            display: flex; flex-direction: column; background: var(--panel-bg); 
            position: sticky; top: 0; z-index: 100; padding: 15px 20px;
            border-radius: 0 0 25px 25px; box-shadow: var(--shadow);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        #timer-display { font-weight: 800; background: #dfe6e9; color: #2d3436; padding: 5px 15px; border-radius: 50px; font-size: 0.9rem; }
        #counter-text { font-weight: 700; color: #636e72; }

        .stats-bar { display: flex; gap: 15px; margin-top: 10px; font-weight: 800; font-size: 0.9rem; }

        .progress-container { width: 100%; height: 8px; background: #f1f2f6; margin-top: 12px; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: var(--info-color); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* --- SIDEBAR --- */
        .sidebar { position: fixed; left: -280px; top: 0; width: 260px; height: 100%; background: #fff; z-index: 1000; transition: 0.4s ease; padding: 30px 20px; box-sizing: border-box; border-radius: 0 30px 30px 0; }
        .sidebar.active { left: 0; }
        .nav-item { display: block; padding: 15px; margin: 8px 0; background: #f9f9f9; border-radius: 15px; text-decoration: none; color: #2d3436; font-weight: 700; text-align: center; transition: 0.2s; }
        .nav-item:active { transform: scale(0.95); background: #eee; }

        /* --- ESCENA --- */
        .phone-screen { max-width: 400px; width: 100%; display: flex; flex-direction: column; gap: 20px; padding: 20px; box-sizing: border-box; }
        
        .scene { display: flex; align-items: flex-end; gap: 10px; margin-top: 10px; position: relative; }

        /* AVATAR VECTORIAL (Minimalista) */
        .avatar-box { position: relative; width: 100px; height: 130px; flex-shrink: 0; }
        .a-face { position: absolute; bottom: 40px; left: 15px; width: 70px; height: 85px; background: #ffe0bd; border-radius: 35px; z-index: 5; }
        .a-hair { position: absolute; top: -5px; left: 10px; width: 80px; height: 60px; background: #2d3436; border-radius: 40px 40px 10px 10px; z-index: 4; }
        .a-eye { position: absolute; top: 35px; width: 10px; height: 10px; background: #2d3436; border-radius: 50%; }
        .a-eye.left { left: 18px; } .a-eye.right { right: 18px; }
        .a-mouth { position: absolute; bottom: 20px; left: 25px; width: 20px; height: 8px; background: #ff7675; border-radius: 0 0 10px 10px; opacity: 0.8; }
        .a-shirt { position: absolute; bottom: 0; left: 10px; width: 80px; height: 45px; border-radius: 20px 20px 0 0; }

        /* BURBUJA TIPO APP */
        .speech-bubble { position: relative; background: #fff; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); flex-grow: 1; margin-bottom: 20px; }
        .speech-bubble::after { content: ''; position: absolute; left: -10px; bottom: 20px; border-width: 10px 10px 10px 0; border-style: solid; border-color: transparent #fff transparent transparent; }
        .speech-bubble p { margin: 0; font-size: 1.1rem; font-weight: 700; line-height: 1.3; }

        /* --- BOTONES MODERNOS --- */
        .options-area { display: flex; flex-direction: column; gap: 15px; }
        .btn-app { background: #fff; border: none; border-radius: 20px; padding: 20px; font-weight: 700; font-size: 1rem; color: var(--text-main); box-shadow: var(--shadow); transition: 0.2s; text-align: left; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        
        .btn-app:active { transform: scale(0.98); }

        /* ANIMACIONES DE FEEDBACK */
        .correct { background-color: var(--correct-color) !important; color: #fff !important; animation: pop 0.4s ease; }
        .wrong { background-color: var(--wrong-color) !important; color: #fff !important; animation: shake 0.4s ease; }
        .reveal { background-color: var(--info-color) !important; color: #fff !important; }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        /* RESULTADOS */
        #result-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(45, 52, 54, 0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .result-card { background: #fff; padding: 40px 30px; border-radius: 35px; max-width: 320px; width: 90%; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .restart-btn { margin-top: 25px; background: var(--bg-color); border: none; padding: 18px; border-radius: 20px; font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; }

        #feedback-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 50px; font-weight: 800; z-index: 2000; display: none; box-shadow: var(--shadow); color: white; }
    </style>
</head>
<body>

    <div id="result-screen">
        <div class="result-card">
            <div id="result-emoji" style="font-size: 60px;">🏆</div>
            <h2 style="margin: 15px 0; font-size: 1.8rem;">¡Simulacro Listo!</h2>
            <p style="font-size: 1.5rem; font-weight: 900; margin-bottom: 5px;">Puntaje: <span id="final-score">0/0</span></p>
            <p id="final-percent" style="font-weight: 800; color: var(--info-color); margin-bottom: 20px;">0% de efectividad</p>
            <div style="background: #f1f2f6; padding: 15px; border-radius: 20px;">
                <p id="result-time" style="margin: 0; font-weight: 700;">Tiempo: 00:00</p>
                <p id="result-msg" style="margin: 5px 0 0 0; font-style: italic; font-size: 0.9rem;"></p>
            </div>
            <button class="restart-btn" onclick="location.reload()">REPETIR SIMULACRO</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <h2 style="margin-bottom: 20px;">Preguntas</h2>
        <div id="menu-list"></div>
    </div>
    <div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); display:none; z-index:999;" onclick="toggleMenu()"></div>

    <div id="feedback-msg"></div>

    <div style="width: 100%; max-width: 420px; min-height: 100vh;">
        <div class="header">
            <div class="header-top">
                <div style="font-size: 24px; cursor: pointer;" onclick="toggleMenu()">☰</div>
                <div id="timer-display">00:00</div>
                <div id="counter-text">1/60</div>
            </div>
            <div class="stats-bar">
                <span style="color: var(--correct-color)">✅ <span id="wins">0</span></span>
                <span style="color: var(--wrong-color)">❌ <span id="losses">0</span></span>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        </div>

        <div class="phone-screen">
            <div class="scene">
                <div class="avatar-box">
                    <div class="a-hair" id="h-color"></div>
                    <div class="a-face">
                        <div class="a-eye left" id="e-l"></div>
                        <div class="a-eye right" id="e-r"></div>
                        <div class="a-mouth" id="m-mouth"></div>
                    </div>
                    <div class="a-shirt" id="s-color"></div>
                </div>
                <div class="speech-bubble">
                    <p id="question-text">Preparando...</p>
                </div>
            </div>
            <div class="options-area" id="options-container"></div>
        </div>
    </div>

            { q: "What time do you usually start work on weekends?", options: ["At noon.", "Only once.", "It's tomorrow."], correct: 0, gender: "man", hair: "#2d3436", shirt: "#d63031" },
            { q: "Look at that modern laptop. It's not expensive!", options: ["Anything else?", "It's the winner!", "It's on sale."], correct: 2, gender: "woman", hair: "#2d3436", shirt: "#55efc4" },
            { q: "Hey, are you studying Spanish now?", options: ["I'm fine.", "That's right.", "It's ok."], correct: 1, gender: "man", hair: "#2d3436", shirt: "#fd79a8" },
            { q: "Hello. Can you please help me? I've lost my suitcase!", options: ["It's too early.", "Hey! Be careful.", "Can you describe it?"], correct: 2, gender: "woman", hair: "#2d3436", shirt: "#00b894" },
            { q: "Are you here for the music class?", options: ["See you!", "I'm not from here.", "Yes, I'm new."], correct: 2, gender: "woman", hair: "#2d3436", shirt: "#fdcb6e" },
            { q: "Let's go for a ride, it's a sunny day!", options: ["Are we around?", "Nothing more.", "It's the best idea!"], correct: 2, gender: "man", hair: "#2d3436", shirt: "#55efc4" },
            { q: "Why didn't you put your new coat on yesterday?", options: ["I liked jeans.", "Let's dress up.", "It was too warm."], correct: 2, gender: "woman", hair: "#2d3436", shirt: "#ff7675" },
            { q: "This movie is about a really big family.", options: ["Is it good?", "Is that a lot?", "Is your mom OK?"], correct: 0, gender: "man", hair: "#2d3436", shirt: "#0984e3" },
            { q: "Why are they hiding?", options: ["Come on!", "I've got no idea.", "Is it near?"], correct: 1, gender: "woman", hair: "#2d3436", shirt: "#a29bfe" },
            { q: "Everyone bought tickets for the rock concert.", options: ["Is it on Saturday?", "There was noise.", "It is fair!"], correct: 0, gender: "man", hair: "#2d3436", shirt: "#d63031" },
            { q: "It seems I'll be the new boss of the business department.", options: ["Excuse me!", "It's ready!", "Congratulations!"], correct: 2, gender: "woman", hair: "#2d3436", shirt: "#6c5ce7" },
            { q: "How about going to the cinema?", options: ["I'm a student.", "That sounds great!", "It's 5 o'clock."], correct: 1, gender: "man", hair: "#2d3436", shirt: "#74b9ff" }
        ];

        let database = [];
        let currentIndex = 0;
        let scoreWins = 0;
        let scoreLosses = 0;
        let isProcessing = false;
        let startTime = null;
        let timerInterval = null;
        let audioCtx = null;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function startTimer() {
            if (startTime) return;
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const diff = Date.now() - startTime;
                const m = Math.floor(diff / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-display').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function loadQuestion() {
            isProcessing = false;
            const data = database[currentIndex];
            
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('counter-text').innerText = `${currentIndex + 1}/${database.length}`;
            
            // Progreso
            const prog = ((currentIndex) / database.length) * 100;
            document.getElementById('progress-bar').style.width = prog + "%";

            // Reset Avatar
            document.getElementById('e-l').style.height = '10px';
            document.getElementById('e-r').style.height = '10px';
            document.getElementById('m-mouth').style.height = '8px';
            document.getElementById('m-mouth').style.borderRadius = '0 0 10px 10px';

            document.getElementById('h-color').style.backgroundColor = data.hair;
            document.getElementById('s-color').style.backgroundColor = data.shirt;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-app';
                btn.id = `btn-${index}`;
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => verify(btn, index);
                container.appendChild(btn);
            });
        }

        function verify(btn, selectedIndex) {
            if (isProcessing) return;
            isProcessing = true;
            startTimer();
            initAudio();

            const correctIndex = database[currentIndex].correct;
            const buttons = document.querySelectorAll('.btn-app');
            buttons.forEach(b => b.classList.add('disabled'));

            if(selectedIndex === correctIndex) {
                btn.classList.add('correct');
                scoreWins++;
                document.getElementById('wins').innerText = scoreWins;
                
                // Ojos felices
                document.getElementById('e-l').style.height = '4px';
                document.getElementById('e-r').style.height = '4px';
                
                playTone(600, 'sine', 0.15);
                showFeedback("¡SÚPER!", "#2ecc71");
                setTimeout(nextQuestion, 1200);
            } else {
                btn.classList.add('wrong');
                document.getElementById(`btn-${correctIndex}`).classList.add('reveal');
                scoreLosses++;
                document.getElementById('losses').innerText = scoreLosses;
                
                // Ojos sorpresa
                document.getElementById('e-l').style.height = '12px';
                document.getElementById('e-r').style.height = '12px';

                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                playTone(150, 'square', 0.3);
                showFeedback("¡CASI!", "#ff7675");
                setTimeout(nextQuestion, 2200);
            }
        }

        function nextQuestion() {
            if(currentIndex < database.length - 1) {
                currentIndex++;
                loadQuestion();
            } else {
                finishExam();
            }
        }

        function finishExam() {
            clearInterval(timerInterval);
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = `${scoreWins} / ${database.length}`;
            const percent = Math.round((scoreWins / database.length) * 100);
            document.getElementById('final-percent').innerText = `${percent}% de efectividad`;
            document.getElementById('result-time').innerText = "Tiempo Total: " + document.getElementById('timer-display').innerText;

            let msg = "";
            let emo = "";
            if(percent >= 90) { msg = "¡Nivel Experto! 😎"; emo = "🏆"; }
            else if(percent >= 70) { msg = "¡Muy avanzado! 🔥"; emo = "🥈"; }
            else { msg = "¡Sigue así! 💪"; emo = "🥉"; }
            
            document.getElementById('result-msg').innerText = msg;
            document.getElementById('result-emoji').innerText = emo;
        }

        function showFeedback(text, color) {
            const msg = document.getElementById('feedback-msg');
            msg.innerText = text;
            msg.style.display = 'block';
            msg.style.backgroundColor = color;
            setTimeout(() => { msg.style.display = 'none'; }, 1000);
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        }

        window.onload = () => {
            database = shuffle([...originalDatabase]);
            const list = document.getElementById('menu-list');
            database.forEach((_, i) => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.innerText = `Q${i + 1}`;
                item.onclick = () => { currentIndex = i; loadQuestion(); toggleMenu(); };
                list.appendChild(item);
            });
            loadQuestion();
        };
    </script>
</body>
</html>
