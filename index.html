<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICFES Part 3 - Pro Edition</title>
    <style>
        :root {
            --comic-border: #000;
            --bg-color: #ffeb3b;
            /* Fuente más legible pero con estilo */
            --main-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--main-font);
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; justify-content: center; min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- HEADER & CONTROLES --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: #fff; border-bottom: 4px solid var(--comic-border);
            position: sticky; top: 0; z-index: 100;
        }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; font-weight: 900; }
        .counter { font-weight: 900; font-size: 1rem; text-transform: uppercase; }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed; left: -260px; top: 0; width: 250px; height: 100%;
            background: #fff; border-right: 4px solid var(--comic-border);
            z-index: 1000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; box-sizing: border-box;
        }
        .sidebar.active { left: 0; }
        .nav-item {
            display: block; padding: 15px; margin: 8px 0;
            background: #f0f0f0; border: 3px solid var(--comic-border);
            text-decoration: none; color: #000; font-weight: 900; border-radius: 8px;
        }

        /* --- ESCENA CÓMIC --- */
        .phone-screen { max-width: 380px; width: 100%; display: flex; flex-direction: column; gap: 15px; padding: 15px; box-sizing: border-box; }
        
        .scene { display: flex; align-items: flex-start; gap: 10px; margin-top: 5px; min-height: 160px; }
        
        /* Personaje optimizado */
        .character-art { position: relative; width: 100px; height: 140px; flex-shrink: 0; }
        .face {
            position: absolute; top: 35px; left: 15px; width: 65px; height: 80px;
            background: #ffdbac; border: 4px solid var(--comic-border); border-radius: 30px 30px 45px 45%; z-index: 5;
        }
        .hair { position: absolute; border: 4px solid var(--comic-border); z-index: 2; }
        .hair.man { height: 50px; width: 75px; top: 5px; left: 10px; border-radius: 40% 40% 10% 10%; }
        .hair.woman { height: 100px; width: 85px; top: 10px; left: 5px; border-radius: 35px 35px 15px 15px; z-index: 1; }

        .eye { position: absolute; top: 22px; width: 12px; height: 15px; background: #fff; border: 3px solid var(--comic-border); border-radius: 50%; }
        .eye.left { left: 10px; } .eye.right { right: 10px; }
        .pupil { position: absolute; top: 4px; left: 3px; width: 6px; height: 7px; background: #000; border-radius: 50%; }
        .is-woman .eye::before { content: '///'; position: absolute; top: -12px; left: -2px; font-size: 10px; font-weight: 900; color: #000; }

        /* BURBUJA LEGILE */
        .speech-bubble {
            position: relative; background: #fff; border: 4px solid var(--comic-border);
            border-radius: 18px; padding: 15px; box-shadow: 6px 6px 0 rgba(0,0,0,0.1); flex-grow: 1;
        }
        .speech-bubble p { margin: 0; font-size: 1.1rem; font-weight: 800; line-height: 1.2; color: #000; }
        .speech-bubble:after { content: ''; position: absolute; left: -15px; top: 25px; border: 10px solid transparent; border-right-color: #fff; z-index: 11; }

        /* BOTONES DE RESPUESTA */
        .options-area { display: flex; flex-direction: column; gap: 12px; }
        .comic-btn {
            background: #fff; border: 4px solid var(--comic-border); border-radius: 12px;
            padding: 18px; font-weight: 900; font-size: 1rem; color: #000;
            box-shadow: 4px 4px 0 var(--comic-border); transition: 0.1s; text-align: left;
            -webkit-tap-highlight-color: transparent;
        }
        .comic-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--comic-border); }

        .correct { background-color: #4caf50 !important; color: white !important; border-color: #1b5e20 !important; }
        .wrong { background-color: #f44336 !important; color: white !important; border-color: #b71c1c !important; }

        /* MENSAJE FLOTANTE */
        #feedback-msg {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; border-radius: 50px; border: 4px solid #000;
            font-weight: 900; font-size: 1.2rem; display: none; z-index: 2000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h2 style="font-weight: 900;">REPASAR</h2>
        <div id="menu-list"></div>
    </div>
    <div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; z-index:999;" onclick="toggleMenu()"></div>

    <div id="feedback-msg"></div>

    <div style="width: 100%; max-width: 400px; background: var(--bg-color);">
        <div class="header">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div class="counter" id="counter-text">PREGUNTA 1/5</div>
        </div>

        <div class="phone-screen">
            <div class="scene">
                <div class="character-art" id="avatar-container">
                    <div id="hair-style" class="hair"></div>
                    <div class="face">
                        <div class="eye left"><div class="pupil"></div></div>
                        <div class="eye right"><div class="pupil"></div></div>
                        <div class="mouth" style="position: absolute; bottom: 12px; left: 18px; width: 25px; height: 8px; border-bottom: 4px solid #000; border-radius: 0 0 15px 15px;"></div>
                    </div>
                    <div class="shoulders" id="shirt-style" style="position: absolute; top: 115px; left: 5px; width: 85px; height: 40px; border: 4px solid #000; border-radius: 15px 15px 0 0; z-index: 4;"></div>
                </div>
                <div class="speech-bubble">
                    <p id="question-text">...</p>
                </div>
            </div>
            <div class="options-area" id="options-container"></div>
        </div>
    </div>

    <script>
        const database = [
            { q: "Can you hold the camera?", options: ["That's quick!", "Of course.", "May I keep this?"], correct: 1, gender: "man", hair: "#4a3121", shirt: "#3f51b5" },
            { q: "Honey, I invited my parents to the party.", options: ["Be careful!", "That's great!", "As soon as possible!"], correct: 1, gender: "woman", hair: "#C65102", shirt: "#E91E63" },
            { q: "Was it a wonderful journey?", options: ["You're lucky!", "Very kind of you!", "Just amazing!"], correct: 2, gender: "man", hair: "#2C3E50", shirt: "#FF9800" },
            { q: "Hey Mark! You should visit us next November.", options: ["How often?", "I'd love to!", "Let's look for it."], correct: 1, gender: "woman", hair: "#F1C40F", shirt: "#9C27B0" },
            { q: "Anna missed the train.", options: ["That's terrible!", "Never again.", "How long is it?"], correct: 0, gender: "man", hair: "#4A3121", shirt: "#2196F3" }
        ];

        let currentIndex = 0;

        // Sonidos (Beep básicos de navegador)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        }

        function loadQuestion() {
            const data = database[currentIndex];
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('counter-text').innerText = `PREGUNTA ${currentIndex + 1}/${database.length}`;
            
            const hair = document.getElementById('hair-style');
            const avatar = document.getElementById('avatar-container');
            const shirt = document.getElementById('shirt-style');
            
            hair.className = "hair " + data.gender;
            hair.style.backgroundColor = data.hair;
            shirt.style.backgroundColor = data.shirt;
            
            avatar.classList.toggle('is-woman', data.gender === "woman");

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'comic-btn';
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => verify(btn, index);
                container.appendChild(btn);
            });
        }

        function showFeedback(text, isCorrect) {
            const msg = document.getElementById('feedback-msg');
            msg.innerText = text;
            msg.style.display = 'block';
            msg.style.backgroundColor = isCorrect ? '#4caf50' : '#f44336';
            msg.style.color = 'white';
            setTimeout(() => { msg.style.display = 'none'; }, 1000);
        }

        function verify(btn, selectedIndex) {
            if(selectedIndex === database[currentIndex].correct) {
                btn.classList.add('correct');
                playTone(600, 'sine', 0.2); // Sonido éxito
                showFeedback("¡EXCELENTE! 🌟", true);
                setTimeout(() => {
                    if(currentIndex < database.length - 1) {
                        currentIndex++;
                        loadQuestion();
                    } else {
                        showFeedback("¡COMPLETADO! 🏆", true);
                    }
                }, 800);
            } else {
                btn.classList.add('wrong');
                if (navigator.vibrate) navigator.vibrate(200); // Vibración iPhone
                playTone(150, 'square', 0.3); // Sonido error
                showFeedback("INTÉNTALO DE NUEVO ❌", false);
                setTimeout(() => btn.classList.remove('wrong'), 800);
            }
        }

        // Inicializar menú
        const list = document.getElementById('menu-list');
        database.forEach((_, i) => {
            const item = document.createElement('div');
            item.className = 'nav-item';
            item.innerText = `Pregunta ${i + 1}`;
            item.onclick = () => { currentIndex = i; loadQuestion(); toggleMenu(); };
            list.appendChild(item);
        });

        loadQuestion();
    </script>
</body>
</html>
