<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Simulator Pro - High-End CSS</title>
    <style>
        :root {
            --bg-color: #ffeb3b;
            --header-bg: linear-gradient(180deg, #000000 0%, #1e272e 100%);
            --panel-bg: #ffffff;
            --text-main: #2d3436;
            --correct-color: #2ecc71;
            --wrong-color: #ff7675;
            --info-color: #0984e3;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.15);
            --skin-base: #ffdbac;
            --skin-shadow: #f1c27d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; justify-content: center; min-height: 100vh;
            color: var(--text-main);
        }

        /* --- HEADER NEGRO DEGRADADO --- */
        .header {
            display: flex; flex-direction: column; background: var(--header-bg); 
            position: sticky; top: 0; z-index: 100; padding: 18px 25px;
            border-radius: 0 0 30px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            color: white;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        #timer-display { font-weight: 800; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 50px; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2); }
        .stats-bar { display: flex; gap: 20px; margin-top: 10px; font-weight: 800; }
        .progress-container { width: 100%; height: 8px; background: rgba(255,255,255,0.1); margin-top: 15px; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: var(--info-color); transition: 0.5s ease; }

        /* --- SIDEBAR --- */
        .sidebar { position: fixed; left: -280px; top: 0; width: 260px; height: 100%; background: #fff; z-index: 1000; transition: 0.4s ease; padding: 30px 20px; box-sizing: border-box; border-radius: 0 30px 30px 0; display: flex; flex-direction: column; box-shadow: var(--shadow-soft); }
        .sidebar.active { left: 0; }
        #menu-list { flex-grow: 1; overflow-y: auto; padding-right: 5px; -webkit-overflow-scrolling: touch; }
        .nav-item { display: block; padding: 15px; margin: 8px 0; background: #f9f9f9; border-radius: 15px; color: #2d3436; font-weight: 700; text-align: center; cursor: pointer; }

        /* --- ESCENA --- */
        .phone-screen { max-width: 420px; width: 100%; display: flex; flex-direction: column; gap: 20px; padding: 20px; box-sizing: border-box; }
        .scene { display: flex; align-items: flex-end; gap: 10px; margin-top: 10px; position: relative; }

        /* AVATARES REALISTAS */
        .avatar-container { position: relative; width: 120px; height: 150px; flex-shrink: 0; }
        .face-real {
            position: absolute; bottom: 35px; left: 15px; width: 85px; height: 105px;
            background: var(--skin-base); border-radius: 40px 40px 55px 55px; z-index: 5;
            box-shadow: inset -5px -10px 15px var(--skin-shadow), inset 5px 5px 10px rgba(255,255,255,0.5);
        }
        .eye-real { position: absolute; top: 40px; width: 22px; height: 16px; background: #fff; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .eye-real.left { left: 12px; } .eye-real.right { right: 12px; }
        .iris { width: 12px; height: 12px; border-radius: 50%; background: radial-gradient(circle, #333 20%, var(--iris-color, #555) 70%); position: relative; }
        .hair-real { position: absolute; z-index: 6; }
        .hair-top { position: absolute; top: -10px; left: 5px; width: 105px; height: 80px; border-radius: 50px 50px 20px 20px; box-shadow: inset 0 5px 15px rgba(255,255,255,0.2); }
        .clothes { position: absolute; bottom: 0; left: 5px; width: 105px; height: 50px; border-radius: 25px 25px 0 0; z-index: 4; }

        /* BURBUJA INTEGRADA */
        .speech-bubble { position: relative; background: #fff; border-radius: 20px; padding: 20px; box-shadow: var(--shadow-soft); flex-grow: 1; margin-bottom: 25px; }
        .speech-bubble::after { content: ''; position: absolute; left: -10px; bottom: 30px; border-width: 12px 12px 12px 0; border-style: solid; border-color: transparent #fff transparent transparent; }
        .speech-bubble p { margin: 0; font-size: 1.1rem; font-weight: 700; line-height: 1.4; }

        /* BOTONES */
        .options-area { display: flex; flex-direction: column; gap: 12px; }
        .btn-app { background: #fff; border: none; border-radius: 20px; padding: 18px 25px; font-weight: 700; font-size: 1rem; color: var(--text-main); box-shadow: var(--shadow-soft); transition: 0.2s; text-align: left; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        
        .correct { background-color: var(--correct-color) !important; color: #fff !important; animation: pop 0.4s ease; }
        .wrong { background-color: var(--wrong-color) !important; color: #fff !important; animation: shake 0.4s ease; }
        .reveal { background-color: var(--info-color) !important; color: #fff !important; }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        /* FEEDBACK MENSAJES */
        #feedback-msg { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 50px; font-weight: 800; z-index: 2000; display: none; box-shadow: var(--shadow-soft); color: white; transition: 0.3s; }

        /* RESULTADOS */
        #result-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .result-card { background: #fff; padding: 40px; border-radius: 35px; max-width: 320px; width: 90%; text-align: center; }
        .restart-btn { margin-top: 20px; background: var(--info-color); color: white; border: none; padding: 18px; border-radius: 20px; font-weight: 800; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div id="result-screen">
        <div class="result-card">
            <h2 style="font-size: 2rem;">🏆</h2>
            <h2>¡Simulacro Terminado!</h2>
            <p style="font-size: 1.5rem; font-weight: 900;"><span id="final-score">0/0</span></p>
            <p id="final-percent" style="font-weight: 800; color: var(--info-color);">0% de efectividad</p>
            <p id="result-time" style="font-weight: 700;">Tiempo: 00:00</p>
            <button class="restart-btn" onclick="location.reload()">REINICIAR SIMULACRO</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <h2 style="margin-top: 0;">Preguntas</h2>
        <div id="menu-list"></div>
    </div>
    <div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); display:none; z-index:999;" onclick="toggleMenu()"></div>

    <div id="feedback-msg"></div>

    <div style="width: 100%; max-width: 440px;">
        <div class="header">
            <div class="header-top">
                <div style="font-size: 24px; cursor: pointer;" onclick="toggleMenu()">☰</div>
                <div id="timer-display">00:00</div>
                <div id="counter-text">1/60</div>
            </div>
            <div class="stats-bar">
                <span style="color: #2ecc71;">✅ <span id="wins">0</span></span>
                <span style="color: #ff7675;">❌ <span id="losses">0</span></span>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        </div>

        <div class="phone-screen">
            <div class="scene">
                <div class="avatar-container" id="avatar-render">
                    <div class="hair-real hair-top" id="hair-main"></div>
                    <div class="clothes" id="clothes-main"></div>
                    <div class="face-real">
                        <div class="eye-real left" id="eye-l-box"><div class="iris" id="iris-l"></div></div>
                        <div class="eye-real right" id="eye-r-box"><div class="iris" id="iris-r"></div></div>
                        <div id="mouth-style" style="position: absolute; bottom: 20px; left: 30px; width: 25px; height: 2px; background: rgba(0,0,0,0.4); border-radius: 10px; transition: 0.3s;"></div>
                    </div>
                </div>
                
                <div class="speech-bubble">
                    <p id="question-text">Preparando...</p>
                </div>
            </div>
            <div class="options-area" id="options-container"></div>
        </div>
    </div>

    <script>
        const characters = [
            { name: "Fem1", hair: "#1a1a1a", iris: "#4e342e", clothes: "#ff80ab" },
            { name: "Fem2", hair: "#5d4037", iris: "#2980b9", clothes: "#9c27b0" },
            { name: "Masc1", hair: "#f1c40f", iris: "#3498db", clothes: "#34495e" },
            { name: "Masc2", hair: "#2d3436", iris: "#2ecc71", clothes: "#16a085" }
        ];

        const originalDatabase = [
            { q: "Let's go to the zoo tomorrow!", options: ["It is closed.", "How many?", "Nice monkey!"], correct: 0 },
            { q: "May I have my bill?", options: ["Not cool.", "A hot drink?", "Sure!"], correct: 2 },
            { q: "Why is she working at the city center?", options: ["Fine!", "Come on!", "No idea!"], correct: 2 },
            { q: "Can you hold the camera?", options: ["That's quick!", "Of course.", "May I keep this?"], correct: 1 },
            { q: "Honey, I invited my parents to the party.", options: ["Be careful!", "That's great!", "As soon as possible!"], correct: 1 },
            { q: "Was it a wonderful journey?", options: ["You're lucky!", "Very kind of you!", "Just amazing!"], correct: 2 },
            { q: "Hey Mark! You should visit us next November.", options: ["How often?", "I'd love to!", "Let's look for it."], correct: 1 },
            { q: "Anna missed the train.", options: ["That's terrible!", "Never again.", "How long is it?"], correct: 0 },
            { q: "Have you got a dress I can wear?", options: ["That's fine!", "Sure!", "Enjoy!"], correct: 1 },
            { q: "We couldn't swim in the pool yesterday.", options: ["Be careful!", "That's exciting!", "What happened?"], correct: 2 },
            { q: "Where did they buy their new car?", options: ["I don't know.", "You are right.", "It's bigger."], correct: 0 },
            { q: "I'm going to the art exhibition soon.", options: ["By the way.", "How long ago?", "How interesting!"], correct: 2 },
            { q: "We haven't discussed our tour plans yet.", options: ["You poor thing.", "Let's do it now.", "As late as possible."], correct: 1 },
            { q: "Have you got any spare change?", options: ["Let me check", "I've already changed it", "I lost my spare"], correct: 0 },
            { q: "Until what time does the tube work?", options: ["It goes until summer time", "The last train has already passed", "There's not enough time to work"], correct: 0 },
            { q: "Did he give you the 10 quid I left you?", options: ["He left you there yesterday", "He doesn't like to give anything", "What's that money for?"], correct: 2 },
            { q: "It's been a lovely supper, ________?", options: ["hasn't it", "it is", "it has"], correct: 0 },
            { q: "Excuse me! Can you tell me where the loo is?", options: ["It's near the chemist", "It's behind the counter", "It's right there"], correct: 2 },
            { q: "Who's Patricia?", options: ["She's fine.", "She's my friend.", "She's Spanish."], correct: 1 },
            { q: "Could you telephone me this evening?", options: ["I will if I can.", "I'll tell him for you.", "If I'm not there, speak to John."], correct: 0 },
            { q: "Have you turned off the computer?", options: ["I don't want it.", "It's on the left.", "I'm still using it."], correct: 2 },
            { q: "When do you finish your class?", options: ["Yesterday.", "At six thirty.", "Two hours ago."], correct: 1 },
            { q: "I think Jane's a very good teacher.", options: ["Who is it?", "How far?", "Do you?"], correct: 2 },
            { q: "The temperature is below zero here.", options: ["Let's go inside.", "Take off your coat.", "It's downstairs."], correct: 0 },
            { q: "I couldn't finish my homework, Lily!", options: ["Very often!", "That's terrible!", "Wait for it!"], correct: 1 },
            { q: "I don't like meatballs.", options: ["Have some chicken.", "It's in the kitchen.", "That's a lot."], correct: 0 },
            { q: "Would you like an apple?", options: ["You're right.", "Yes, please.", "So do I."], correct: 1 },
            { q: "I think Charlie's is the best café in town!", options: ["How much is it?", "Was it wrong?", "Is it near?"], correct: 2 },
            { q: "I met my new neighbor yesterday. She's a Brazilian singer.", options: ["Welcome!", "Awesome!", "Surprise!"], correct: 1 },
            { q: "Are you going to the gym tonight?", options: ["Maybe tomorrow.", "Not much.", "Twice a month."], correct: 0 },
            { q: "How long will the journey take?", options: ["Over two hours.", "At midnight.", "I won't be late."], correct: 0 },
            { q: "May I borrow your bracelet, please?", options: ["A little bit.", "In cash.", "Sure."], correct: 2 },
            { q: "Oh, dear! I forgot how to use this cell phone.", options: ["It's repaired.", "Let me help you.", "Be prepared."], correct: 1 },
            { q: "I can clean the house for you today.", options: ["That's nice!", "They're mine.", "How many?"], correct: 0 },
            { q: "Shall we cook something? I'm hungry.", options: ["How often?", "I brought one!", "What about chicken?"], correct: 2 },
            { q: "Let's go to the park and play tennis!", options: ["Answer!", "Again?", "Bye."], correct: 1 },
            { q: "I'm afraid I have to buy a better laptop.", options: ["Not often.", "That's brilliant!", "What's wrong?"], correct: 2 },
            { q: "Have you joined the theater club yet?", options: ["A month ago.", "Yes, I agree.", "At the moment."], correct: 0 },
            { q: "Make sure that you keep the medicine in the cabinet.", options: ["It's kind.", "See you soon.", "Of course!"], correct: 2 },
            { q: "So, who is going to repair the engine?", options: ["I'll do it myself.", "I'll go straight.", "I'll look for it."], correct: 0 },
            { q: "I can go to the restaurant and get some food.", options: ["Whose rice?", "That's really nice!", "Look at me."], correct: 1 },
            { q: "I must go home.", options: ["Who is wrong?", "That's sad!", "It's brilliant."], correct: 1 },
            { q: "I'll give you your earrings back tomorrow.", options: ["It's a special set.", "Sure, no problem.", "Wonderful jewelry."], correct: 1 },
            { q: "Good to have you back in the school again!", options: ["Yes, that's funny.", "Oh! How silly.", "Thanks, I'm happy."], correct: 2 },
            { q: "Son, stop it! You could hurt someone!", options: ["Help me, mom!", "That's sweet!", "All right!"], correct: 2 },
            { q: "Do you want to make an appointment with the designer?", options: ["Just before?", "Of course!", "Last February."], correct: 1 },
            { q: "How did you get that dictionary?", options: ["I borrowed it.", "Do you have a dollar?", "A minute ago."], correct: 0 },
            { q: "We got free tickets. These two are for you.", options: ["Thank you.", "I'm worried.", "That's the best one."], correct: 0 },
            { q: "What time do you usually start work on weekends?", options: ["At noon.", "Only once.", "It's tomorrow."], correct: 0 },
            { q: "Look at that modern laptop. It's not expensive!", options: ["Anything else?", "It's the winner!", "It's on sale."], correct: 2 },
            { q: "Hey, are you studying Spanish now?", options: ["I'm fine.", "That's right.", "It's ok."], correct: 1 },
            { q: "Hello. Can you please help me? I've lost my suitcase!", options: ["It's too early.", "Hey! Be careful.", "Can you describe it?"], correct: 2 },
            { q: "Are you here for the music class?", options: ["See you!", "I'm not from here.", "Yes, I'm new."], correct: 2 },
            { q: "Let's go for a ride, it's a sunny day!", options: ["Are we around?", "Nothing more.", "It's the best idea!"], correct: 2 },
            { q: "Why didn't you put your new coat on yesterday?", options: ["I liked jeans.", "Let's dress up.", "It was too warm."], correct: 2 },
            { q: "This movie is about a really big family.", options: ["Is it good?", "Is that a lot?", "Is your mom OK?"], correct: 0 },
            { q: "Why are they hiding?", options: ["Come on!", "I've got no idea.", "Is it near?"], correct: 1 },
            { q: "Everyone bought tickets for the rock concert.", options: ["Is it on Saturday?", "There was noise.", "It is fair!"], correct: 0 },
            { q: "It seems I'll be the new boss of the business department.", options: ["Excuse me!", "It's ready!", "Congratulations!"], correct: 2 },
            { q: "How about going to the cinema?", options: ["I'm a student.", "That sounds great!", "It's 5 o'clock."], correct: 1 }
        ];

        let database = [];
        let currentIndex = 0;
        let scoreWins = 0;
        let scoreLosses = 0;
        let isProcessing = false;
        let startTime = null;
        let timerInterval = null;
        let audioCtx = null;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            // VOLUMEN AUMENTADO: de 0.05 a 0.15
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function startTimer() {
            if (startTime) return;
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const diff = Date.now() - startTime;
                const m = Math.floor(diff / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-display').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function loadQuestion() {
            isProcessing = false;
            const data = database[currentIndex];
            
            const char = characters[Math.floor(Math.random() * characters.length)];
            document.getElementById('hair-main').style.backgroundColor = char.hair;
            document.getElementById('iris-l').style.setProperty('--iris-color', char.iris);
            document.getElementById('iris-r').style.setProperty('--iris-color', char.iris);
            document.getElementById('clothes-main').style.backgroundColor = char.clothes;

            // RESET EXPRESIONES (Neutral)
            document.getElementById('eye-l-box').style.height = '16px';
            document.getElementById('eye-r-box').style.height = '16px';
            const mouth = document.getElementById('mouth-style');
            mouth.style.height = '2px';
            mouth.style.borderRadius = '10px';
            mouth.style.borderBottom = 'none';
            mouth.style.borderTop = 'none';

            document.getElementById('question-text').innerText = data.q;
            document.getElementById('counter-text').innerText = `${currentIndex + 1}/${database.length}`;
            const prog = ((currentIndex) / database.length) * 100;
            document.getElementById('progress-bar').style.width = prog + "%";

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-app';
                btn.id = `btn-${index}`;
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => verify(btn, index);
                container.appendChild(btn);
            });
        }

        function verify(btn, selectedIndex) {
            if (isProcessing) return;
            isProcessing = true;
            startTimer();
            initAudio();
            const correctIndex = database[currentIndex].correct;
            const buttons = document.querySelectorAll('.btn-app');
            buttons.forEach(b => b.classList.add('disabled'));

            const mouth = document.getElementById('mouth-style');

            if(selectedIndex === correctIndex) {
                btn.classList.add('correct');
                scoreWins++;
                document.getElementById('wins').innerText = scoreWins;
                
                // EXPRESIÓN FELIZ (Sonrisa)
                document.getElementById('eye-l-box').style.height = '6px';
                document.getElementById('eye-r-box').style.height = '6px';
                mouth.style.height = '12px';
                mouth.style.borderRadius = '0 0 15px 15px';
                mouth.style.background = 'transparent';
                mouth.style.borderBottom = '4px solid rgba(0,0,0,0.6)';

                playTone(600, 'sine', 0.15);
                showFeedback("Melo", "#2ecc71");
                setTimeout(nextQuestion, 1200);
            } else {
                btn.classList.add('wrong');
                document.getElementById(`btn-${correctIndex}`).classList.add('reveal');
                scoreLosses++;
                document.getElementById('losses').innerText = scoreLosses;
                
                // EXPRESIÓN TRISTE / DECEPCIÓN (Boca curva hacia arriba)
                document.getElementById('eye-l-box').style.height = '20px';
                document.getElementById('eye-r-box').style.height = '20px';
                mouth.style.height = '12px';
                mouth.style.borderRadius = '15px 15px 0 0';
                mouth.style.background = 'transparent';
                mouth.style.borderTop = '4px solid rgba(0,0,0,0.6)';
                mouth.style.borderBottom = 'none';

                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                playTone(150, 'square', 0.3);
                showFeedback("Nel, pilas", "#ff7675");
                setTimeout(nextQuestion, 2200);
            }
        }

        function showFeedback(text, color) {
            const msg = document.getElementById('feedback-msg');
            msg.innerText = text;
            msg.style.display = 'block';
            msg.style.backgroundColor = color;
            setTimeout(() => { msg.style.display = 'none'; }, 1000);
        }

        function nextQuestion() {
            if(currentIndex < database.length - 1) {
                currentIndex++;
                loadQuestion();
            } else {
                clearInterval(timerInterval);
                document.getElementById('result-screen').style.display = 'flex';
                document.getElementById('final-score').innerText = `${scoreWins} / ${database.length}`;
                const percent = Math.round((scoreWins / database.length) * 100);
                document.getElementById('final-percent').innerText = `${percent}% de efectividad`;
                document.getElementById('result-time').innerText = "Tiempo: " + document.getElementById('timer-display').innerText;
            }
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        }

        window.onload = () => {
            database = shuffle([...originalDatabase]);
            const list = document.getElementById('menu-list');
            database.forEach((_, i) => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.innerText = `Q${i + 1}`;
                item.onclick = () => { currentIndex = i; loadQuestion(); toggleMenu(); };
                list.appendChild(item);
            });
            loadQuestion();
        };
    </script>
</body>
</html>
