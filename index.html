<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICFES Part 3 - Pro Edition</title>
    <style>
        :root {
            --comic-border: #000;
            --bg-color: #ffeb3b;
        }

        body {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; justify-content: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- MENÚ LATERAL (HAMBURGUESA) --- */
        .sidebar {
            position: fixed; left: -250px; top: 0; width: 250px; height: 100%;
            background: #fff; border-right: 4px solid var(--comic-border);
            z-index: 1000; transition: 0.3s; padding: 20px; box-sizing: border-box;
        }
        .sidebar.active { left: 0; }
        .sidebar h2 { border-bottom: 3px solid var(--comic-border); padding-bottom: 10px; }
        .nav-item {
            display: block; padding: 12px; margin: 5px 0;
            background: #eee; border: 2px solid var(--comic-border);
            text-decoration: none; color: #000; font-weight: bold; cursor: pointer;
        }
        .nav-item:hover { background: #ffeb3b; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 999;
        }
        .overlay.active { display: block; }

        /* --- HEADER --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: #fff; border-bottom: 4px solid var(--comic-border);
            position: sticky; top: 0; z-index: 100;
        }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; font-weight: bold; }
        .counter { font-weight: bold; font-size: 1.1rem; }

        .phone-screen { max-width: 380px; width: 100%; display: flex; flex-direction: column; gap: 15px; padding: 10px; }

        /* --- ESCENA Y AVATAR --- */
        .scene { display: flex; align-items: flex-start; gap: 10px; margin-top: 10px; min-height: 180px; }
        .character-art { position: relative; width: 110px; height: 150px; flex-shrink: 0; }
        .face {
            position: absolute; top: 40px; left: 20px; width: 65px; height: 80px;
            background: #ffdbac; border: 4px solid var(--comic-border); border-radius: 30px 30px 50px 50%; z-index: 5;
        }
        .hair { position: absolute; border: 4px solid var(--comic-border); z-index: 2; transition: 0.3s; }
        .hair.man { height: 55px; width: 75px; top: 5px; left: 15px; border-radius: 50% 50% 20% 20%; }
        .hair.woman { height: 105px; width: 90px; top: 10px; left: 8px; border-radius: 40px 40px 20px 20px; z-index: 1; }

        .eye { position: absolute; top: 22px; width: 12px; height: 15px; background: #fff; border: 3px solid var(--comic-border); border-radius: 50%; }
        .eye.left { left: 10px; } .eye.right { right: 10px; }
        .lashes { display: none; position: absolute; top: -12px; left: -2px; font-size: 12px; }
        .is-woman .lashes { display: block; }

        .pupil { position: absolute; top: 4px; left: 3px; width: 6px; height: 7px; background: #000; border-radius: 50%; }
        .mouth { position: absolute; bottom: 12px; left: 18px; width: 25px; height: 8px; border-bottom: 4px solid var(--comic-border); border-radius: 0 0 15px 15px; }
        .shoulders { position: absolute; top: 120px; left: 5px; width: 95px; height: 40px; border: 4px solid var(--comic-border); border-radius: 20px 20px 0 0; z-index: 4; }

        /* BURBUJA */
        .speech-bubble {
            position: relative; background: #fff; border: 4px solid var(--comic-border);
            border-radius: 20px; padding: 15px; box-shadow: 5px 5px 0 rgba(0,0,0,0.1); flex-grow: 1;
        }
        .speech-bubble:after { content: ''; position: absolute; left: -15px; top: 25px; border: 10px solid transparent; border-right-color: #fff; z-index: 11; }
        .speech-bubble:before { content: ''; position: absolute; left: -20px; top: 23px; border: 12px solid transparent; border-right-color: var(--comic-border); z-index: 9; }

        /* BOTONES */
        .options-area { display: flex; flex-direction: column; gap: 12px; }
        .comic-btn {
            background: #fff; border: 4px solid var(--comic-border); border-radius: 10px;
            padding: 15px; font-weight: bold; font-family: inherit; font-size: 1rem;
            box-shadow: 4px 4px 0 var(--comic-border); transition: 0.1s; text-align: left;
        }
        .correct { background-color: #4caf50 !important; color: white; }
        .wrong { background-color: #f44336 !important; color: white; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h2>Preguntas</h2>
        <div id="menu-list"></div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div style="width: 100%; max-width: 400px; background: var(--bg-color);">
        <div class="header">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div class="counter" id="counter-text">Pregunta 1/5</div>
        </div>

        <div class="phone-screen">
            <div class="scene">
                <div class="character-art" id="avatar-container">
                    <div id="hair-style" class="hair"></div>
                    <div class="face">
                        <div class="eye left"><span class="lashes">💅</span><div class="pupil"></div></div>
                        <div class="eye right"><span class="lashes">💅</span><div class="pupil"></div></div>
                        <div class="mouth"></div>
                    </div>
                    <div class="shoulders" id="shirt-style"></div>
                </div>
                <div class="speech-bubble">
                    <p id="question-text">...</p>
                </div>
            </div>
            <div class="options-area" id="options-container"></div>
        </div>
    </div>

    <script>
        const database = [
            {
                q: "Can you hold the camera?",
                options: ["That's quick!", "Of course.", "May I keep this?"],
                correct: 1, gender: "man", hair: "#4a3121", shirt: "#3f51b5"
            },
            {
                q: "Honey, I invited my parents to the party.",
                options: ["Be careful!", "That's great!", "As soon as possible!"],
                correct: 1, gender: "woman", hair: "#C65102", shirt: "#E91E63"
            },
            {
                q: "Was it a wonderful journey?",
                options: ["You're lucky!", "Very kind of you!", "Just amazing!"],
                correct: 2, gender: "man", hair: "#2C3E50", shirt: "#FF9800"
            },
            {
                q: "Hey Mark! You should visit us next November.",
                options: ["How often?", "I'd love to!", "Let's look for it."],
                correct: 1, gender: "woman", hair: "#F1C40F", shirt: "#9C27B0"
            },
            {
                q: "Anna missed the train.",
                options: ["That's terrible!", "Never again.", "How long is it?"],
                correct: 0, gender: "man", hair: "#4A3121", shirt: "#2196F3"
            }
        ];

        let currentIndex = 0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function buildMenu() {
            const list = document.getElementById('menu-list');
            list.innerHTML = '';
            database.forEach((_, i) => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.innerText = `Pregunta ${i + 1}`;
                item.onclick = () => { goToQuestion(i); toggleMenu(); };
                list.appendChild(item);
            });
        }

        function goToQuestion(index) {
            currentIndex = index;
            loadQuestion();
        }

        function loadQuestion() {
            const data = database[currentIndex];
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('counter-text').innerText = `Pregunta ${currentIndex + 1}/${database.length}`;
            
            const hair = document.getElementById('hair-style');
            const avatar = document.getElementById('avatar-container');
            const shirt = document.getElementById('shirt-style');
            
            hair.className = "hair " + data.gender;
            hair.style.backgroundColor = data.hair;
            shirt.style.backgroundColor = data.shirt;
            
            if(data.gender === "woman") avatar.classList.add('is-woman');
            else avatar.classList.remove('is-woman');

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'comic-btn';
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => verify(btn, index);
                container.appendChild(btn);
            });
        }

        function verify(btn, selectedIndex) {
            if(selectedIndex === database[currentIndex].correct) {
                btn.classList.add('correct');
                setTimeout(() => {
                    if(currentIndex < database.length - 1) {
                        currentIndex++;
                        loadQuestion();
                    } else {
                        alert("¡Ronda terminada! Puedes usar el menú para repasar.");
                    }
                }, 800);
            } else {
                btn.classList.add('wrong');
            }
        }

        buildMenu();
        loadQuestion();
    </script>
</body>
</html>
